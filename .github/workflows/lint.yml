name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      
permissions: {}

jobs:
  lint:
    name: "Lint and type checking"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Ruff check
        run: ruff check

      - name: Type checking
        run: ty check
